<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dual Morse Control</title>

  <style>
    :root{
      --bg:#f3f0e8;
      --line:#111111;
      --white:#f8f6f1;
      --red:#d7261e;
      --blue:#1f57d6;
      --yellow:#f2c318;
      --green:#198754;
      --off:#6c757d;
      --shadow:0 6px 14px rgba(0,0,0,.08);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:var(--bg);
      color:#111;
      font-family:Arial, Helvetica, sans-serif;
      overflow:hidden;
    }

    body{
      min-height:100dvh;
    }

    .wrap{
      width:min(100%, 1180px);
      height:100dvh;
      margin:0 auto;
      padding:8px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:8px;
      overflow:hidden;
    }

    .top{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:8px;
      min-height:0;
    }

    .box{
      border:4px solid var(--line);
      background:var(--white);
      box-shadow:var(--shadow);
      min-width:0;
      min-height:0;
    }

    .head{
      padding:10px 12px;
      min-height:70px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .head h1{
      margin:0;
      font-size:clamp(20px, 3vw, 30px);
      font-weight:900;
      letter-spacing:.5px;
      line-height:1;
    }

    .head p{
      margin:5px 0 0 0;
      font-size:12px;
      font-weight:700;
      line-height:1.2;
    }

    .global{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
      background:var(--yellow);
      font-size:clamp(12px, 1.6vw, 16px);
      font-weight:900;
      text-transform:uppercase;
      text-align:center;
      min-height:70px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      min-height:0;
    }

    .panel{
      display:grid;
      grid-template-rows:auto 1fr;
      min-height:0;
    }

    .panel-head{
      display:grid;
      grid-template-columns:1fr 112px;
      border-bottom:4px solid var(--line);
      min-height:74px;
    }

    .panel-title{
      padding:10px 12px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
      min-width:0;
    }

    .panel-title h2{
      margin:0;
      font-size:clamp(24px, 4vw, 34px);
      font-weight:900;
      letter-spacing:.5px;
      line-height:1;
    }

    .tag{
      display:inline-block;
      width:max-content;
      max-width:100%;
      border:3px solid var(--line);
      padding:4px 8px;
      background:#fff;
      font-size:11px;
      font-weight:900;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .status{
      border-left:4px solid var(--line);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:8px 6px;
      min-width:0;
    }

    .status.blue{
      background:var(--blue);
      color:#fff;
    }

    .status.yellow{
      background:var(--yellow);
      color:#111;
    }

    .light{
      width:18px;
      height:18px;
      border:3px solid var(--line);
      background:var(--off);
      flex:0 0 auto;
    }

    .light.on{
      background:var(--green);
    }

    .status-text{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      text-align:center;
      line-height:1.05;
      word-break:break-word;
    }

    .body{
      padding:10px;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:8px;
      min-height:0;
    }

    .section-title{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:6px;
      letter-spacing:.4px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-height:0;
    }

    .field label{
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    textarea,
    input,
    button{
      font:inherit;
    }

    textarea{
      width:100%;
      height:54px;
      min-height:54px;
      max-height:54px;
      resize:none;
      border:3px solid var(--line);
      background:#fff;
      color:#111;
      padding:8px;
      outline:none;
      border-radius:0;
      font-size:13px;
      line-height:1.15;
    }

    .controls-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
    }

    .mini-field{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .mini-field label{
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .mini-field input{
      width:100%;
      height:34px;
      border:3px solid var(--line);
      background:#fff;
      color:#111;
      padding:4px 8px;
      outline:none;
      border-radius:0;
      font-size:12px;
      font-weight:900;
    }

    .vu-panel-wrap{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-top:2px;
    }

    .vu-panel-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }

    .vu-panel-label{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .vu-panel-value{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
    }

    .vu-panel{
      width:100%;
      height:18px;
      border:3px solid var(--line);
      background:#fff;
      overflow:hidden;
    }

    .vu-panel-bar{
      height:100%;
      width:0%;
      background:var(--green);
      transition:width .12s linear;
    }

    .btn-row{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:8px;
      align-content:end;
    }

    button{
      border:3px solid var(--line);
      padding:8px 6px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.3px;
      cursor:pointer;
      background:#fff;
      color:#111;
      border-radius:0;
      min-height:42px;
      font-size:12px;
      line-height:1;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }

    button:hover{
      filter:brightness(.98);
    }

    .btn-blue{
      background:var(--blue);
      color:#fff;
    }

    .btn-red{
      background:var(--red);
      color:#fff;
    }

    .btn-yellow{
      background:var(--yellow);
      color:#111;
    }

    .btn-white{
      background:#fff;
      color:#111;
    }

    .footer{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      min-height:0;
    }

    .foot{
      min-height:62px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px;
      font-size:12px;
      font-weight:900;
      border:4px solid var(--line);
      box-shadow:var(--shadow);
      background:var(--white);
      min-width:0;
      overflow:hidden;
      word-break:break-word;
      line-height:1.1;
    }

    .foot.red{
      background:var(--red);
      color:#fff;
    }

    .foot.blue{
      background:var(--blue);
      color:#fff;
    }

    .foot.yellow{
      background:var(--yellow);
      color:#111;
    }

    .foot.white{
      background:var(--white);
      color:#111;
    }

    .rf-wrap{
      display:flex;
      flex-direction:column;
      gap:6px;
      width:100%;
    }

    .rf-label{
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .vu{
      width:100%;
      height:18px;
      border:3px solid var(--line);
      background:#fff;
      position:relative;
      overflow:hidden;
    }

    .vu-bar{
      height:100%;
      width:0%;
      background:var(--green);
      transition:width .12s linear;
    }

    .vu-value{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      line-height:1;
    }

    @media (max-width: 900px){
      .wrap{
        padding:6px;
        gap:6px;
      }

      .top{
        grid-template-columns:1fr;
        gap:6px;
      }

      .grid{
        grid-template-columns:1fr 1fr;
        gap:6px;
      }

      .panel-head{
        grid-template-columns:1fr 84px;
        min-height:64px;
      }

      .panel-title{
        padding:8px;
        gap:4px;
      }

      .panel-title h2{
        font-size:22px;
      }

      .tag{
        font-size:9px;
        padding:3px 6px;
        border-width:2px;
      }

      .status{
        padding:6px 4px;
        gap:4px;
        border-left:4px solid var(--line);
      }

      .light{
        width:14px;
        height:14px;
        border-width:2px;
      }

      .status-text{
        font-size:9px;
      }

      .body{
        padding:8px;
        gap:6px;
      }

      .section-title{
        font-size:10px;
        margin-bottom:4px;
      }

      .field label,
      .mini-field label{
        font-size:9px;
      }

      textarea{
        height:48px;
        min-height:48px;
        max-height:48px;
        padding:6px;
        font-size:11px;
        border-width:2px;
      }

      .mini-field input{
        height:30px;
        border-width:2px;
        font-size:11px;
      }

      .vu-panel-wrap{
        gap:4px;
      }

      .vu-panel-label,
      .vu-panel-value,
      .rf-label,
      .vu-value{
        font-size:9px;
      }

      .vu-panel,
      .vu{
        height:14px;
        border-width:2px;
      }

      .btn-row{
        gap:6px;
      }

      button{
        min-height:34px;
        padding:6px 4px;
        font-size:10px;
        border-width:2px;
      }

      .footer{
        grid-template-columns:1fr 1fr;
        gap:6px;
      }

      .foot{
        min-height:50px;
        padding:6px;
        font-size:10px;
        border-width:3px;
      }

      .head{
        min-height:56px;
        padding:8px 10px;
      }

      .head h1{
        font-size:18px;
      }

      .head p{
        font-size:10px;
        margin-top:4px;
      }

      .global{
        min-height:46px;
        padding:8px;
        font-size:11px;
      }
    }

    @media (max-width: 430px){
      .wrap{
        padding:4px;
        gap:4px;
      }

      .top,
      .grid,
      .footer{
        gap:4px;
      }

      .grid{
        grid-template-columns:1fr 1fr;
      }

      .panel-head{
        grid-template-columns:1fr 74px;
        min-height:56px;
      }

      .panel-title h2{
        font-size:18px;
      }

      .tag{
        font-size:8px;
      }

      textarea{
        height:44px;
        min-height:44px;
        max-height:44px;
        font-size:10px;
      }

      .mini-field input{
        height:28px;
        font-size:10px;
      }

      button{
        min-height:30px;
        font-size:9px;
      }

      .foot{
        min-height:44px;
        font-size:9px;
      }

      .status-text{
        font-size:8px;
      }

      .global{
        font-size:10px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="box head">
        <h1>DUAL MORSE CONTROL</h1>
        <p>Auto conexión · VHF y UHF · un Arduino</p>
      </div>
      <div class="box global" id="globalStatus">INICIANDO</div>
    </div>

    <div class="grid">
      <div class="box panel">
        <div class="panel-head">
          <div class="panel-title">
            <h2>VHF</h2>
            <span class="tag">radio=vhf</span>
          </div>
          <div class="status blue">
            <div class="light" id="dot-vhf"></div>
            <div class="status-text" id="state-vhf">DESCONECTADO</div>
          </div>
        </div>

        <div class="body">
          <div>
            <div class="section-title">Mensaje</div>
            <div class="field">
              <label for="text-vhf">Texto</label>
              <textarea id="text-vhf">CQ CQ DE IVAN</textarea>

              <div class="controls-2">
                <div class="mini-field">
                  <label for="wpm-vhf">Velocidad</label>
                  <input id="wpm-vhf" type="number" min="5" max="60" step="1" value="15" />
                </div>
                <div class="mini-field">
                  <label for="tone-vhf">Tono</label>
                  <input id="tone-vhf" type="number" min="200" max="2000" step="10" value="700" />
                </div>
              </div>

              <div class="vu-panel-wrap">
                <div class="vu-panel-top">
                  <div class="vu-panel-label">RF VHF</div>
                  <div class="vu-panel-value" id="rfInfo-vhf">--</div>
                </div>
                <div class="vu-panel">
                  <div class="vu-panel-bar" id="rfBar-vhf"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn-blue" onclick="sendText('vhf')">Send</button>
            <button class="btn-yellow" onclick="stopRadio('vhf')">Stop</button>
            <button class="btn-red" onclick="pttRadio('vhf','ON')">PTT ON</button>
            <button class="btn-white" onclick="pttRadio('vhf','OFF')">PTT OFF</button>
          </div>
        </div>
      </div>

      <div class="box panel">
        <div class="panel-head">
          <div class="panel-title">
            <h2>UHF</h2>
            <span class="tag">radio=uhf</span>
          </div>
          <div class="status yellow">
            <div class="light" id="dot-uhf"></div>
            <div class="status-text" id="state-uhf">DESCONECTADO</div>
          </div>
        </div>

        <div class="body">
          <div>
            <div class="section-title">Mensaje</div>
            <div class="field">
              <label for="text-uhf">Texto</label>
              <textarea id="text-uhf">CQ CQ DE IVAN</textarea>

              <div class="controls-2">
                <div class="mini-field">
                  <label for="wpm-uhf">Velocidad</label>
                  <input id="wpm-uhf" type="number" min="5" max="60" step="1" value="15" />
                </div>
                <div class="mini-field">
                  <label for="tone-uhf">Tono</label>
                  <input id="tone-uhf" type="number" min="200" max="2000" step="10" value="700" />
                </div>
              </div>

              <div class="vu-panel-wrap">
                <div class="vu-panel-top">
                  <div class="vu-panel-label">RF UHF</div>
                  <div class="vu-panel-value" id="rfInfo-uhf">--</div>
                </div>
                <div class="vu-panel">
                  <div class="vu-panel-bar" id="rfBar-uhf"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn-yellow" onclick="sendText('uhf')">Send</button>
            <button class="btn-white" onclick="stopRadio('uhf')">Stop</button>
            <button class="btn-red" onclick="pttRadio('uhf','ON')">PTT ON</button>
            <button class="btn-white" onclick="pttRadio('uhf','OFF')">PTT OFF</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="foot yellow" id="portInfo">BUSCANDO ARDUINO</div>
      <div class="foot red" id="activeInfo">AUTO</div>
      <div class="foot blue">UN ARDUINO</div>
      <div class="foot white">
        <div class="rf-wrap">
          <div class="rf-label">RF Smooth</div>
          <div class="vu">
            <div class="vu-bar" id="rfBar"></div>
          </div>
          <div class="vu-value" id="rfInfo">RF --</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const initialConfig = {{ config | tojson }};
    const radioIds = ["vhf", "uhf"];
    let currentPort = initialConfig.port || "";
    let currentBaud = initialConfig.baud || 115200;
    let connecting = false;

    const dirtyText = { vhf: false, uhf: false };
    const dirtyParams = { vhf: false, uhf: false };

    function el(id) {
      return document.getElementById(id);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function sanitizeInt(value, fallback, min, max) {
      const n = Number.parseInt(value, 10);
      if (!Number.isFinite(n)) return fallback;
      return Math.max(min, Math.min(max, n));
    }

    function getRadioParams(radioId) {
      const wpm = sanitizeInt(el(`wpm-${radioId}`).value, 15, 5, 60);
      const tone = sanitizeInt(el(`tone-${radioId}`).value, 700, 200, 2000);

      el(`wpm-${radioId}`).value = String(wpm);
      el(`tone-${radioId}`).value = String(tone);

      return { wpm, tone };
    }

    function bindDirtyFlags() {
      for (const radioId of radioIds) {
        const ta = el(`text-${radioId}`);
        const wpm = el(`wpm-${radioId}`);
        const tone = el(`tone-${radioId}`);

        ta.addEventListener("input", () => {
          dirtyText[radioId] = true;
        });

        wpm.addEventListener("input", () => {
          dirtyParams[radioId] = true;
        });

        tone.addEventListener("input", () => {
          dirtyParams[radioId] = true;
        });
      }
    }

    function setStatus(msg) {
      el("globalStatus").textContent = String(msg).toUpperCase();
    }

    function renderVuFor(barId, infoId, smooth) {
      const maxSmooth = 1023;
      const pct = clamp((smooth / maxSmooth) * 100, 0, 100);

      const bar = el(barId);
      const info = el(infoId);

      bar.style.width = `${pct}%`;
      info.textContent = `${smooth}`;

      if (pct >= 75) {
        bar.style.background = "var(--red)";
      } else if (pct >= 35) {
        bar.style.background = "var(--yellow)";
      } else {
        bar.style.background = "var(--green)";
      }
    }

    async function api(url, options = {}) {
      const res = await fetch(url, options);
      let data = null;

      try {
        data = await res.json();
      } catch {
        data = { ok: false, error: "Respuesta inválida del servidor" };
      }

      if (!res.ok || !data.ok) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function loadInitialConfig() {
      const radios = initialConfig.radios || {};
      const vhf = radios.vhf || {};
      const uhf = radios.uhf || {};

      el("text-vhf").value = vhf.text ?? "CQ CQ DE IVAN";
      el("text-uhf").value = uhf.text ?? "CQ CQ DE IVAN";

      el("wpm-vhf").value = vhf.wpm ?? 15;
      el("wpm-uhf").value = uhf.wpm ?? 15;

      el("tone-vhf").value = vhf.tone ?? 700;
      el("tone-uhf").value = uhf.tone ?? 700;

      dirtyText.vhf = false;
      dirtyText.uhf = false;
      dirtyParams.vhf = false;
      dirtyParams.uhf = false;
    }

    function renderRadioState(radioId, radioData) {
      const dot = el(`dot-${radioId}`);
      const state = el(`state-${radioId}`);
      const connected = !!radioData.connected;
      const busy = !!radioData.busy;
      const ptt = !!radioData.ptt;

      dot.classList.toggle("on", connected);

      if (!connected) {
        state.textContent = "DESCONECTADO";
      } else if (busy) {
        state.textContent = "TX";
      } else if (ptt) {
        state.textContent = "PTT";
      } else {
        state.textContent = "CONECTADO";
      }
    }

    function renderActive(activeRadio) {
      el("activeInfo").textContent = activeRadio
        ? `ACTIVE ${String(activeRadio).toUpperCase()}`
        : "IDLE";
    }

    function pickBestPort(ports) {
      if (!Array.isArray(ports) || !ports.length) return "";

      const preferred = ports.find(p =>
        /ttyUSB0|ttyUSB1|ttyACM0|ttyACM1/i.test(p.device || "")
      );
      if (preferred) return preferred.device;

      return ports[0].device || "";
    }

    async function autoConnect() {
      if (connecting) return false;
      connecting = true;

      try {
        const portsData = await api("/api/ports");
        const port = currentPort || pickBestPort(portsData.ports || []);

        if (!port) {
          el("portInfo").textContent = "SIN PUERTO";
          setStatus("sin arduino");
          return false;
        }

        currentPort = port;
        el("portInfo").textContent = port;

        await api("/api/connect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            port: currentPort,
            baud: currentBaud
          })
        });

        try {
          await api("/api/status", { method: "POST" });
        } catch {}

        setStatus("arduino conectado");
        return true;
      } catch (err) {
        setStatus(`error conexión: ${err.message}`);
        return false;
      } finally {
        connecting = false;
      }
    }

    async function refreshState() {
      try {
        const data = await api("/api/radios");

        for (const radioId of radioIds) {
          const r = (data.radios && data.radios[radioId]) || {};
          renderRadioState(radioId, r);

          const ta = el(`text-${radioId}`);
          const isFocusedText = document.activeElement === ta;
          const isFocusedWpm = document.activeElement === el(`wpm-${radioId}`);
          const isFocusedTone = document.activeElement === el(`tone-${radioId}`);

          if (!dirtyText[radioId] && !isFocusedText && typeof r.text === "string" && r.text.length) {
            ta.value = r.text;
          }

          if (!dirtyParams[radioId] && !isFocusedWpm && typeof r.wpm !== "undefined") {
            el(`wpm-${radioId}`).value = r.wpm;
          }

          if (!dirtyParams[radioId] && !isFocusedTone && typeof r.tone !== "undefined") {
            el(`tone-${radioId}`).value = r.tone;
          }

          if (r.port) {
            currentPort = r.port;
          }
        }

        el("portInfo").textContent = data.connected
          ? (currentPort || "CONECTADO")
          : "DESCONECTADO";

        renderActive(data.active_radio || null);
        return !!data.connected;
      } catch (err) {
        setStatus(`error estado: ${err.message}`);
        return false;
      }
    }

    async function ensureConnected() {
      const connected = await refreshState();
      if (!connected) {
        const ok = await autoConnect();
        if (!ok) throw new Error("no conectado");
        await refreshState();
      }
    }

    async function sendText(radioId) {
      try {
        await ensureConnected();

        const text = el(`text-${radioId}`).value;
        const { wpm, tone } = getRadioParams(radioId);

        await api("/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            radio: radioId,
            text,
            wpm,
            tone
          })
        });

        dirtyText[radioId] = false;
        dirtyParams[radioId] = false;

        setStatus(`send ${radioId} ${wpm}wpm ${tone}hz`);
        setTimeout(refreshState, 150);
      } catch (err) {
        setStatus(`error send ${radioId}: ${err.message}`);
      }
    }

    async function stopRadio(radioId) {
      try {
        await ensureConnected();

        await api("/api/stop", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ radio: radioId })
        });

        setStatus(`stop ${radioId}`);
        setTimeout(refreshState, 150);
      } catch (err) {
        setStatus(`error stop ${radioId}: ${err.message}`);
      }
    }

    async function pttRadio(radioId, state) {
      try {
        await ensureConnected();

        await api("/api/ptt", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            radio: radioId,
            state: state
          })
        });

        setStatus(`ptt ${state} ${radioId}`);
        setTimeout(refreshState, 150);
      } catch (err) {
        setStatus(`error ptt ${radioId}: ${err.message}`);
      }
    }

    async function refreshRf() {
      try {
        const res = await fetch("http://192.168.1.4:5050/rf", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "rf error");

        const rf = data.rf || {};
        const smooth = Number(rf.smooth ?? 0);

        renderVuFor("rfBar-vhf", "rfInfo-vhf", smooth);
        renderVuFor("rfBar-uhf", "rfInfo-uhf", smooth);
        renderVuFor("rfBar", "rfInfo", smooth);
        el("rfInfo").textContent = `RF ${smooth}`;
      } catch (err) {
        renderVuFor("rfBar-vhf", "rfInfo-vhf", 0);
        renderVuFor("rfBar-uhf", "rfInfo-uhf", 0);
        renderVuFor("rfBar", "rfInfo", 0);
        el("rfInfo").textContent = "RF OFFLINE";
      }
    }

    async function boot() {
      loadInitialConfig();
      bindDirtyFlags();
      setStatus("buscando arduino");

      try { await autoConnect(); } catch {}
      try { await refreshState(); } catch {}
      try { await refreshRf(); } catch {}

      setInterval(async () => {
        try { await refreshState(); } catch {}
      }, 1200);

      setInterval(async () => {
        try { await refreshRf(); } catch {}
      }, 1000);
    }

    boot();
  </script>
</body>
</html>
