<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dual Radio Control</title>
  <style>
    :root{
      --bg:#f3f0e8;
      --line:#111111;
      --white:#f8f6f1;
      --red:#d7261e;
      --blue:#1f57d6;
      --yellow:#f2c318;
      --green:#198754;
      --off:#6c757d;
      --shadow:0 10px 24px rgba(0,0,0,.10);
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:#111;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:14px;
    }

    .top{
      display:grid;
      grid-template-columns: 2fr 1fr;
      gap:14px;
      margin-bottom:14px;
    }

    .box{
      border:6px solid var(--line);
      background:var(--white);
      box-shadow:var(--shadow);
      min-width:0;
    }

    .head{
      padding:18px;
      min-height:110px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .head h1{
      margin:0;
      font-size:34px;
      font-weight:900;
      letter-spacing:1px;
    }

    .head p{
      margin:8px 0 0 0;
      font-size:14px;
      font-weight:700;
    }

    .global{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:var(--yellow);
      font-size:18px;
      font-weight:900;
      text-transform:uppercase;
      text-align:center;
      min-height:110px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }

    .panel{
      display:grid;
      grid-template-rows:auto 1fr;
    }

    .panel-head{
      display:grid;
      grid-template-columns: 1fr auto;
      border-bottom:6px solid var(--line);
      min-height:110px;
    }

    .panel-title{
      padding:18px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:8px;
    }

    .panel-title h2{
      margin:0;
      font-size:42px;
      font-weight:900;
      letter-spacing:1px;
    }

    .tag{
      display:inline-block;
      width:max-content;
      border:4px solid var(--line);
      padding:6px 10px;
      background:#fff;
      font-size:12px;
      font-weight:900;
    }

    .status{
      min-width:160px;
      border-left:6px solid var(--line);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:14px;
    }

    .status.blue{ background:var(--blue); color:#fff; }
    .status.yellow{ background:var(--yellow); color:#111; }

    .light{
      width:28px;
      height:28px;
      border:4px solid var(--line);
      background:var(--off);
    }

    .light.on{ background:var(--green); }

    .status-text{
      font-size:16px;
      font-weight:900;
      text-transform:uppercase;
      text-align:center;
    }

    .body{
      padding:16px;
      display:grid;
      gap:14px;
    }

    .section-title{
      font-size:14px;
      font-weight:900;
      text-transform:uppercase;
      margin-bottom:8px;
      letter-spacing:.5px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    input, textarea, button{
      font:inherit;
    }

    textarea{
      width:100%;
      min-height:120px;
      resize:vertical;
      border:4px solid var(--line);
      background:#fff;
      color:#111;
      padding:12px;
      outline:none;
      border-radius:0;
    }

    .btn-row{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:10px;
    }

    button{
      border:4px solid var(--line);
      padding:14px 12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.5px;
      cursor:pointer;
      background:#fff;
      color:#111;
      border-radius:0;
      min-height:58px;
    }

    button:hover{
      filter:brightness(.98);
    }

    .btn-blue{ background:var(--blue); color:#fff; }
    .btn-red{ background:var(--red); color:#fff; }
    .btn-yellow{ background:var(--yellow); color:#111; }
    .btn-white{ background:#fff; color:#111; }

    .footer{
      margin-top:14px;
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:14px;
    }

    .foot{
      min-height:80px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:14px;
      font-size:14px;
      font-weight:900;
      border:6px solid var(--line);
      box-shadow:var(--shadow);
      background:var(--white);
    }

    .foot.red{ background:var(--red); color:#fff; }
    .foot.blue{ background:var(--blue); color:#fff; }
    .foot.yellow{ background:var(--yellow); color:#111; }

    @media (max-width: 900px){
      .top,
      .grid,
      .footer{
        grid-template-columns:1fr;
      }

      .panel-head{
        grid-template-columns:1fr;
      }

      .status{
        border-left:none;
        border-top:6px solid var(--line);
        min-width:0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="box head">
        <h1>DUAL RADIO CONTROL</h1>
        <p>Un Arduino · auto conexión · VHF y UHF separados</p>
      </div>
      <div class="box global" id="globalStatus">INICIANDO</div>
    </div>

    <div class="grid">
      <div class="box panel">
        <div class="panel-head">
          <div class="panel-title">
            <h2>VHF</h2>
            <span class="tag">radio=vhf</span>
          </div>
          <div class="status blue">
            <div class="light" id="dot-vhf"></div>
            <div class="status-text" id="state-vhf">DESCONECTADO</div>
          </div>
        </div>

        <div class="body">
          <div>
            <div class="section-title">Mensaje</div>
            <div class="field">
              <label for="text-vhf">Texto</label>
              <textarea id="text-vhf">CQ CQ DE IVAN</textarea>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn-blue" onclick="sendText('vhf')">Send</button>
            <button class="btn-yellow" onclick="stopRadio('vhf')">Stop</button>
            <button class="btn-red" onclick="pttRadio('vhf','ON')">PTT ON</button>
            <button class="btn-white" onclick="pttRadio('vhf','OFF')">PTT OFF</button>
          </div>
        </div>
      </div>

      <div class="box panel">
        <div class="panel-head">
          <div class="panel-title">
            <h2>UHF</h2>
            <span class="tag">radio=uhf</span>
          </div>
          <div class="status yellow">
            <div class="light" id="dot-uhf"></div>
            <div class="status-text" id="state-uhf">DESCONECTADO</div>
          </div>
        </div>

        <div class="body">
          <div>
            <div class="section-title">Mensaje</div>
            <div class="field">
              <label for="text-uhf">Texto</label>
              <textarea id="text-uhf">CQ CQ DE IVAN</textarea>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn-yellow" onclick="sendText('uhf')">Send</button>
            <button class="btn-white" onclick="stopRadio('uhf')">Stop</button>
            <button class="btn-red" onclick="pttRadio('uhf','ON')">PTT ON</button>
            <button class="btn-white" onclick="pttRadio('uhf','OFF')">PTT OFF</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="foot yellow" id="portInfo">BUSCANDO ARDUINO</div>
      <div class="foot red">AUTO CONNECT</div>
      <div class="foot blue">UN ARDUINO</div>
    </div>
  </div>

  <script>
    const radioIds = ["vhf", "uhf"];
    let currentPort = "";
    let currentBaud = 115200;
    let connecting = false;

    function el(id) {
      return document.getElementById(id);
    }

    function setStatus(msg) {
      el("globalStatus").textContent = String(msg).toUpperCase();
    }

    async function api(url, options = {}) {
      const res = await fetch(url, options);
      let data = null;

      try {
        data = await res.json();
      } catch {
        data = { ok: false, error: "Respuesta inválida del servidor" };
      }

      if (!res.ok || !data.ok) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }

      return data;
    }

    function renderRadioState(radioId, connected) {
      const dot = el(`dot-${radioId}`);
      const state = el(`state-${radioId}`);

      if (connected) {
        dot.classList.add("on");
        state.textContent = "CONECTADO";
      } else {
        dot.classList.remove("on");
        state.textContent = "DESCONECTADO";
      }
    }

    function pickBestPort(ports) {
      if (!Array.isArray(ports) || !ports.length) return "";

      const preferred = ports.find(p =>
        /ttyUSB0|ttyUSB1|ttyACM0|ttyACM1/i.test(p.device || "")
      );
      if (preferred) return preferred.device;

      return ports[0].device || "";
    }

    async function autoConnect() {
      if (connecting) return;
      connecting = true;

      try {
        const portsData = await api("/api/ports");
        const port = pickBestPort(portsData.ports || []);

        if (!port) {
          el("portInfo").textContent = "SIN PUERTO";
          setStatus("sin arduino");
          connecting = false;
          return;
        }

        currentPort = port;
        el("portInfo").textContent = port;

        await api("/api/connect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            port: currentPort,
            baud: currentBaud
          })
        });

        setStatus("arduino conectado");
        await refreshState();
      } catch (err) {
        setStatus(`error conexión: ${err.message}`);
      } finally {
        connecting = false;
      }
    }

    async function refreshState() {
      try {
        const data = await api("/api/radios");

        for (const radioId of radioIds) {
          const r = data.radios?.[radioId] || {};
          renderRadioState(radioId, !!r.connected);

          if (typeof r.text === "string" && r.text.length) {
            el(`text-${radioId}`).value = r.text;
          }

          if (r.port) {
            currentPort = r.port;
            el("portInfo").textContent = r.port;
          }
        }

        const anyConnected = radioIds.some(id => !!data.radios?.[id]?.connected);
        if (anyConnected) {
          setStatus("listo");
        } else {
          setStatus("reconectando");
          await autoConnect();
        }
      } catch (err) {
        setStatus(`error estado: ${err.message}`);
      }
    }

    async function sendText(radioId) {
      try {
        await api("/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            radio: radioId,
            text: el(`text-${radioId}`).value,
            wpm: 15,
            tone: 700
          })
        });

        setStatus(`send ${radioId}`);
      } catch (err) {
        setStatus(`error send ${radioId}: ${err.message}`);
      }
    }

    async function stopRadio(radioId) {
      try {
        await api("/api/stop", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ radio: radioId })
        });

        setStatus(`stop ${radioId}`);
      } catch (err) {
        setStatus(`error stop ${radioId}: ${err.message}`);
      }
    }

    async function pttRadio(radioId, state) {
      try {
        await api("/api/ptt", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            radio: radioId,
            state: state
          })
        });

        setStatus(`ptt ${state} ${radioId}`);
      } catch (err) {
        setStatus(`error ptt ${radioId}: ${err.message}`);
      }
    }

    async function boot() {
      setStatus("buscando arduino");
      await autoConnect();
      await refreshState();
      setInterval(refreshState, 3000);
    }

    boot();
  </script>
</body>
</html>
